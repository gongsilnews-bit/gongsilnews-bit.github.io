<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판 관리</title>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable.css" />
    <style>
        :root {
            --bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --hover: #f9fafb;
            --primary: #374151;
            --primary-hover: #1f2937;
        }
        body { 
            font-family: 'Pretendard Variable', -apple-system, sans-serif; 
            margin: 0; padding: 32px; 
            background: #fff; color: var(--text-main); 
        }
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); 
        }
        h2 { margin: 0; font-size: 20px; font-weight: 700; color: #111; }
        
        .btn { 
            padding: 8px 16px; font-size: 13px; font-weight: 600; border-radius: 4px; 
            cursor: pointer; transition: all 0.2s; border: none; 
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-outline { background: #fff; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { background: var(--hover); }
        
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 12px 16px; font-size: 13px; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid var(--border); }
        td { padding: 16px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:hover { background: var(--hover); }
        
        .badge { 
            display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; 
            background: #f3f4f6; color: #374151; border: 1px solid var(--border); 
        }
        
        /* Modal UI */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; 
            backdrop-filter: blur(2px);
        }
        .modal { 
            background: #fff; width: 540px; border-radius: 8px; padding: 28px; 
            box-shadow: 0 4px 24px rgba(0,0,0,0.15); border: 1px solid var(--border);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .modal-header h3 { margin: 0; font-size: 17px; font-weight: 700; color: #111; }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #9ca3af; line-height: 1;}
        .close-btn:hover { color: #111; }
        
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #4b5563; margin-bottom: 6px; }
        .form-group input, .form-group select { 
            width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 4px; 
            font-size: 14px; box-sizing: border-box; background: #fff; font-family: inherit; color: #111;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(55, 65, 81, 0.1); }
        
        .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 28px; }
        
        .skin-icon { font-size: 16px; margin-right: 6px; vertical-align: middle; color: #6b7280; }
        .description-text { font-size: 12px; color: #9ca3af; margin-top: 4px; display: block; }
    </style>
</head>
<body>
    <div class="header">
        <h2>게시판 리스트 및 설정</h2>
        <button class="btn btn-primary" onclick="openModal()">+ 새 게시판 생성</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>고유 ID</th>
                <th>게시판명</th>
                <th>스킨 테마 설정</th>
                <th>권한 설정 (목록/읽기/쓰기)</th>
                <th>관리 액션</th>
            </tr>
        </thead>
        <tbody id="boardTableBody">
            <!-- 샘플 데이터: 동영상 자료실 -->
            <tr>
                <td style="font-family: monospace; color: var(--text-muted); font-size: 13px;">bbs_drone</td>
                <td style="font-weight: 700;">드론 영상 <span style="font-size:12px; color:#9ca3af; font-weight:400; margin-left:6px;">(자료실)</span></td>
                <td><span class="badge"><span class="skin-icon">▶</span> 동영상 앨범형</span></td>
                <td style="font-size: 13px; color: var(--text-muted);">1 / 1 / 9</td>
                <td>
                    <div style="display:flex; gap:6px;">
                        <button class="btn btn-outline" style="padding: 4px 10px; font-size: 12px;">설정</button>
                        <button class="btn btn-outline" style="padding: 4px 10px; font-size: 12px; color:#dc2626; border-color: #fecaca; background: #fef2f2;">삭제</button>
                    </div>
                </td>
            </tr>
            <!-- 샘플 데이터: 문서 자료실 -->
            <tr>
                <td style="font-family: monospace; color: var(--text-muted); font-size: 13px;">bbs_form</td>
                <td style="font-weight: 700;">계약서/양식 <span style="font-size:12px; color:#9ca3af; font-weight:400; margin-left:6px;">(자료실)</span></td>
                <td><span class="badge"><span class="skin-icon">📄</span> 자료실 썸네일형</span></td>
                <td style="font-size: 13px; color: var(--text-muted);">1 / 1 / 9</td>
                <td>
                    <div style="display:flex; gap:6px;">
                        <button class="btn btn-outline" style="padding: 4px 10px; font-size: 12px;">설정</button>
                        <button class="btn btn-outline" style="padding: 4px 10px; font-size: 12px; color:#dc2626; border-color: #fecaca; background: #fef2f2;">삭제</button>
                    </div>
                </td>
            </tr>
            <!-- 샘플 데이터: 자유게시판 -->
            <tr>
                <td style="font-family: monospace; color: var(--text-muted); font-size: 13px;">bbs_free</td>
                <td style="font-weight: 700;">명함/블로그 디자인</td>
                <td><span class="badge"><span class="skin-icon">🖼️</span> 일반 앨범형</span></td>
                <td style="font-size: 13px; color: var(--text-muted);">1 / 5 / 9</td>
                <td>
                    <div style="display:flex; gap:6px;">
                        <button class="btn btn-outline" style="padding: 4px 10px; font-size: 12px;">설정</button>
                        <button class="btn btn-outline" style="padding: 4px 10px; font-size: 12px; color:#dc2626; border-color: #fecaca; background: #fef2f2;">삭제</button>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>

    <!-- 게시판 설정 모달 -->
    <div class="modal-overlay" id="boardModal">
        <div class="modal">
            <div class="modal-header">
                <h3>게시판 생성 및 설정</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            
            <div class="form-group">
                <label>게시판 고유 ID <span style="color:#ef4444">*</span></label>
                <input type="text" id="boardId" placeholder="예: bbs_notice (영문, 숫자 조합)">
                <span class="description-text">URL 주소로 사용될 고유 이름입니다.</span>
            </div>
            
            <div style="display:flex; gap:16px;">
                <div class="form-group" style="flex:1;">
                    <label>게시판 이름 <span style="color:#ef4444">*</span></label>
                    <input type="text" id="boardName" placeholder="예: 공지사항">
                </div>
                <div class="form-group" style="flex:1;">
                    <label>보조 타이틀</label>
                    <input type="text" id="boardSubtitle" placeholder="예: 자료실">
                </div>
            </div>

            <div style="display:flex; gap:16px;">
                <div class="form-group" style="flex:2;">
                    <label>스킨 / 테마 구조 선택 <span style="color:#ef4444">*</span></label>
                    <select id="boardSkin">
                        <option value="default_bbs">📝 일반 리스트형 (자유게시판/공지사항)</option>
                        <option value="video_album">▶ 동영상 앨범형 (유튜브 + 드라이브 다운로드 최적화)</option>
                        <option value="file_album">📄 파일 자료실형 (디자인 썸네일 + 다운로드 버튼)</option>
                        <option value="faq_album">💡 자주묻는질문 (FAQ 아코디언형)</option>
                        <option value="qna_1on1">🔒 1:1 문의 (작성자/관리자 전용 비밀글)</option>
                    </select>
                </div>
                <div class="form-group" style="flex:1;">
                    <label>가로 갯수 (앨범형)</label>
                    <select id="galleryColumns">
                        <option value="2">2개씩 보기</option>
                        <option value="3" selected>3개씩 보기</option>
                        <option value="4">4개씩 보기</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>세부 카테고리 (분류)</label>
                <input type="text" id="boardCategories" placeholder="쉼표(,)로 구분하여 입력하세요. 예: 드론, 아파트, 빌딩">
            </div>

            <div style="display:flex; gap:16px;">
                <div class="form-group" style="flex:1;">
                    <label>목록 열람 권한</label>
                    <select id="authList">
                        <option value="0">비회원 + 전체</option>
                        <option value="1" selected>1레벨 (일반회원 이상)</option>
                        <option value="5">5레벨 (기자/제휴 이상)</option>
                        <option value="9">9레벨 (관리자 전용)</option>
                    </select>
                </div>
                <div class="form-group" style="flex:1;">
                    <label>내용 읽기/다운로드 권한</label>
                    <select id="authRead">
                        <option value="0">비회원 + 전체</option>
                        <option value="1">1레벨 (일반회원 이상)</option>
                        <option value="5" selected>5레벨 (기자/제휴 이상)</option>
                        <option value="9">9레벨 (관리자 전용)</option>
                    </select>
                </div>
                <div class="form-group" style="flex:1;">
                    <label>글쓰기 권한</label>
                    <select id="authWrite">
                        <option value="1">1레벨 (일반회원 이상)</option>
                        <option value="5">5레벨 (기자/제휴 이상)</option>
                        <option value="9" selected>9레벨 (관리자 전용)</option>
                    </select>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal()">취소</button>
                <button class="btn btn-primary" onclick="saveBoard()">설정 저장하기</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase_gongsi_config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadBoards();
        });

        async function loadBoards() {
            const tableBody = document.getElementById('boardTableBody');
            const sb = window.gongsiClient || window.supabaseClient;
            if(!sb) {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">DB 초기화 실패</td></tr>';
                return;
            }

            const { data, error } = await sb.from('boards').select('*').order('created_at', { ascending: false });
            if (error) {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">게시판 데이터를 불러올 수 없습니다. (' + error.message + ')</td></tr>';
                return;
            }

            if (!data || data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#666;">생성된 게시판이 없습니다. 새 게시판을 만들어주세요.</td></tr>';
                return;
            }

            tableBody.innerHTML = data.map(b => {
                let skinIcon = '📝';
                let skinLabel = '일반 리스트형';
                if (b.skin_type === 'video_album') { skinIcon = '▶'; skinLabel = '동영상 앨범형'; }
                else if (b.skin_type === 'file_album') { skinIcon = '📄'; skinLabel = '자료실 썸네일형'; }
                else if (b.skin_type === 'faq_album') { skinIcon = '💡'; skinLabel = 'FAQ 아코디언형'; }
                else if (b.skin_type === 'qna_1on1') { skinIcon = '🔒'; skinLabel = '1:1 비밀 문의형'; }

                return `
                <tr>
                    <td style="font-family: monospace; color: var(--text-muted); font-size: 13px;">${b.board_id}</td>
                    <td style="font-weight: 700; cursor: pointer;" onclick="editBoard('${b.board_id}')" title="클릭시 설정창이 열립니다">
                        <span style="color: #2563eb; text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s;" onmouseover="this.style.borderBottom='1px solid #2563eb'" onmouseout="this.style.borderBottom='transparent'">${b.board_name}</span> 
                        <span style="font-size:12px; color:#9ca3af; font-weight:400; margin-left:6px;">(${b.subtitle || ''})</span>
                    </td>
                    <td><span class="badge"><span class="skin-icon">${skinIcon}</span> ${skinLabel}</span></td>
                    <td style="font-size: 13px; color: var(--text-muted);">${b.auth_list} / ${b.auth_read} / ${b.auth_write}</td>
                    <td>
                        <div style="display:flex; gap:6px;">
                            <button class="btn btn-outline" style="padding: 4px 10px; font-size: 12px; border-color:#d1d5db;" onclick="editBoard('${b.board_id}')">설정</button>
                            <button class="btn btn-outline" style="padding: 4px 10px; font-size: 12px;" onclick="location.href='../board.html?id=${b.board_id}'">미리보기</button>
                            <button class="btn btn-outline" style="padding: 4px 10px; font-size: 12px; color:#dc2626; border-color: #fecaca; background: #fef2f2;" onclick="deleteBoard('${b.board_id}')">삭제</button>
                        </div>
                    </td>
                </tr>
                `;
            }).join('');
        }

        let isEditMode = false;
        let currentEditId = null;

        function openModal(isEdit = false) {
            isEditMode = isEdit;
            const modalTitle = document.querySelector('.modal-header h3');
            if(!isEdit) {
                // 비우기
                document.getElementById('boardId').value = '';
                document.getElementById('boardId').disabled = false;
                document.getElementById('boardName').value = '';
                document.getElementById('boardSubtitle').value = '';
                document.getElementById('boardSkin').value = 'default_bbs';
                document.getElementById('boardCategories').value = '';
                document.getElementById('galleryColumns').value = '3';
                modalTitle.innerText = '게시판 생성';
            } else {
                modalTitle.innerText = '게시판 설정(수정)';
            }
            document.getElementById('boardModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('boardModal').style.display = 'none';
        }

        async function editBoard(bid) {
            const sb = window.gongsiClient || window.supabaseClient;
            const { data, error } = await sb.from('boards').select('*').eq('board_id', bid).single();
            if(!data) return alert('정보를 불러올 수 없습니다.');
            
            document.getElementById('boardId').value = data.board_id;
            document.getElementById('boardId').disabled = true; // ID는 수정 불가
            document.getElementById('boardName').value = data.board_name;
            document.getElementById('boardSubtitle').value = data.subtitle || '';
            document.getElementById('boardSkin').value = data.skin_type;
            document.getElementById('boardCategories').value = data.categories || '';
            document.getElementById('galleryColumns').value = data.gallery_columns || '3';
            
            document.getElementById('authList').value = data.auth_list;
            document.getElementById('authRead').value = data.auth_read;
            document.getElementById('authWrite').value = data.auth_write;

            openModal(true);
        }

        async function saveBoard() {
            const id = document.getElementById('boardId').value;
            const name = document.getElementById('boardName').value;
            const sub = document.getElementById('boardSubtitle').value;
            const skin = document.getElementById('boardSkin').value;
            const cat = document.getElementById('boardCategories').value;
            const gCols = parseInt(document.getElementById('galleryColumns').value) || 3;
            const aList = parseInt(document.getElementById('authList').value) || 1;
            const aRead = parseInt(document.getElementById('authRead').value) || 1;
            const aWrite = parseInt(document.getElementById('authWrite').value) || 9;

            if(!id || !name) return alert('게시판 고유 ID와 게시판명은 필수 입력 항목입니다.');

            const sb = window.gongsiClient || window.supabaseClient;
            if(!sb) return alert('DB 클라이언트 연결 오류');

            const boardData = {
                board_id: id,
                board_name: name,
                subtitle: sub,
                skin_type: skin,
                categories: cat,
                gallery_columns: gCols,
                auth_list: aList,
                auth_read: aRead,
                auth_write: aWrite
            };

            const { error } = await sb.from('boards').upsert([boardData]);
            
            if (error) {
                alert('게시판 저장 실패: ' + error.message);
                console.error(error);
            } else {
                alert('게시판이 성공적으로 저장되었습니다!');
                closeModal();
                loadBoards(); // 목록 새로고침
            }
        }

        async function deleteBoard(bid) {
            if(!confirm(`정말 '${bid}' 게시판을 삭제하시겠습니까?\n내부의 모든 게시물이 함께 삭제될 수 있습니다.`)) return;
            const sb = window.gongsiClient || window.supabaseClient;
            const { error } = await sb.from('boards').delete().eq('board_id', bid);
            if(error) alert('삭제 실패: ' + error.message);
            else loadBoards();
        }
        
        // 다크모드 대응

        window.addEventListener('message', function(e) {
            if(e.data === 'darkmode:on') {
                document.documentElement.style.setProperty('--bg', '#1f2937');
                document.documentElement.style.setProperty('--text-main', '#f3f4f6');
                document.documentElement.style.setProperty('--text-muted', '#9ca3af');
                document.documentElement.style.setProperty('--border', '#374151');
                document.documentElement.style.setProperty('--hover', '#374151');
                document.documentElement.style.setProperty('--primary', '#4b5563');
                document.documentElement.style.setProperty('--primary-hover', '#6b7280');
                document.body.style.background = '#1a1b1e';
                
                document.querySelector('.modal').style.background = '#1f2937';
                document.querySelector('.modal').style.borderColor = '#374151';
                document.querySelectorAll('.form-group input, .form-group select').forEach(el => {
                    el.style.background = '#374151';
                    el.style.color = '#f3f4f6';
                    el.style.borderColor = '#4b5563';
                });
            } else if(e.data === 'darkmode:off') {
                document.documentElement.style.setProperty('--bg', '#ffffff');
                document.documentElement.style.setProperty('--text-main', '#111827');
                document.documentElement.style.setProperty('--text-muted', '#6b7280');
                document.documentElement.style.setProperty('--border', '#e5e7eb');
                document.documentElement.style.setProperty('--hover', '#f9fafb');
                document.documentElement.style.setProperty('--primary', '#374151');
                document.documentElement.style.setProperty('--primary-hover', '#1f2937');
                document.body.style.background = '#ffffff';
                
                document.querySelector('.modal').style.background = '#ffffff';
                document.querySelector('.modal').style.borderColor = '#e5e7eb';
                document.querySelectorAll('.form-group input, .form-group select').forEach(el => {
                    el.style.background = '#ffffff';
                    el.style.color = '#111827';
                    el.style.borderColor = '#e5e7eb';
                });
            }
        });
    </script>
</body>
</html>
