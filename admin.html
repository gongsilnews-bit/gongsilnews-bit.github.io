<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매물관리 - 공실뉴스 Admin</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable.css" />
    <style>
        :root {
            --primary-color: #ff9f1c;
            --bg-body: #f4f5f7;
            --bg-card: #ffffff;
            --border-color: #e1e4e8;
            --text-main: #333333;
            --text-sub: #666666;
            --blue-filter-bg: #f0f4fc;
            --dark-btn-bg: #4b5563;

            --color-sale:    #e53e3e;
            --color-jeonse:  #2b6cb0;
            --color-monthly: #6b46c1;
            --color-short:   #b7791f;

            --color-realtor: #2b6cb0;
            --color-general: #276749;
            --color-admin:   #c05621;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-body);
            padding: 24px;
            margin: 0;
            color: var(--text-main);
            line-height: 1.5;
        }

        .admin-card {
            background-color: var(--bg-card);
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            padding: 32px;
            min-height: 800px;
        }

        /* ── 헤더 ── */
        .card-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 24px; }
        .card-header h2 { margin: 0; font-size: 1.25rem; font-weight: 700; color: #111; }
        .card-header .count-info { font-size: 13px; color: #666; }
        .card-header .count-info .ad-count   { color: var(--primary-color); font-weight: 700; }
        .card-header .count-info .total-count { color: #333; font-weight: 700; }

        /* ── 필터 ── */
        .filter-container {
            background-color: var(--blue-filter-bg);
            border-radius: 6px;
            padding: 18px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .filter-group { display: flex; align-items: center; gap: 6px; }
        .filter-label { font-size: 13px; font-weight: 600; color: #555; white-space: nowrap; }

        .filter-input {
            padding: 7px 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 13px;
            background-color: #fff;
            outline: none;
            font-family: inherit;
            color: var(--text-main);
        }
        .filter-input:focus { border-color: #4285f4; }
        select.filter-input { cursor: pointer; }
        .filter-divider { width: 1px; height: 24px; background-color: #d1d5db; margin: 0 4px; }

        .btn-search {
            background-color: var(--dark-btn-bg);
            color: white; border: none;
            padding: 7px 14px; border-radius: 4px;
            font-size: 13px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 4px;
            font-family: inherit; transition: background 0.15s;
        }
        .btn-search:hover { background-color: #374151; }

        .btn-reset {
            background-color: #fff; color: #666;
            border: 1px solid #d1d5db;
            padding: 7px 14px; border-radius: 4px;
            font-size: 13px; cursor: pointer;
            font-family: inherit; transition: background 0.15s;
        }
        .btn-reset:hover { background-color: #f9fafb; }

        /* ── 액션 바 ── */
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .left-actions { display: flex; gap: 6px; }

        .btn {
            padding: 6px 12px; font-size: 13px; font-weight: 500;
            border-radius: 4px; border: 1px solid #d1d5db;
            background: #fff; cursor: pointer;
            display: inline-flex; align-items: center; gap: 4px;
            color: #333; font-family: inherit; transition: background 0.15s;
        }
        .btn:hover { background-color: #f3f4f6; }

        .btn-register {
            background-color: #4285f4; color: white;
            border: none; padding: 8px 18px;
            font-weight: 700; font-size: 13px;
        }
        .btn-register:hover { background-color: #3367d6; }

        /* ── 테이블 ── */
        .table-container { width: 100%; overflow-x: auto; border-top: 2px solid #333; }

        table {
            width: 100%; border-collapse: collapse;
            font-size: 13px; min-width: 1050px;
        }

        th {
            background-color: #fafafa;
            border-bottom: 1px solid #e5e7eb;
            padding: 12px 8px;
            font-weight: 700; color: #333;
            text-align: center; white-space: nowrap;
        }

        td {
            padding: 14px 8px;
            border-bottom: 1px solid #f1f3f5;
            text-align: center; vertical-align: middle; color: #444;
        }

        tr:hover td { background-color: #fafcff; }

        /* ── 번호 셀 (배지 제거, 번호만) ── */
        .cell-num { font-size: 11px; color: #aaa; }

        /* ── 광고 토글 버튼 ── */
        .btn-ad-toggle {
            display: inline-block;
            padding: 3px 10px; border-radius: 4px;
            font-size: 11px; font-weight: 700;
            cursor: pointer; border: none;
            transition: background 0.15s, transform 0.1s;
            font-family: inherit; white-space: nowrap; user-select: none;
        }
        .btn-ad-toggle:active { transform: scale(0.96); }
        .btn-ad-toggle.state-on  { background-color: #4285f4; color: #fff; }
        .btn-ad-toggle.state-on:hover  { background-color: #3367d6; }
        .btn-ad-toggle.state-off { background-color: #9ca3af; color: #fff; }
        .btn-ad-toggle.state-off:hover { background-color: #6b7280; }

        .ad-date { font-size: 10px; color: #aaa; margin-top: 3px; }

        /* ── 주소/연락처 셀 ── */
        .cell-addr { text-align: left; min-width: 160px; }
        .addr-main { font-weight: 700; font-size: 13px; color: #111; margin-bottom: 3px; }
        .contact-row { display: flex; align-items: center; gap: 4px; margin-top: 2px; }
        .contact-badge {
            font-size: 9px; font-weight: 700;
            padding: 1px 4px; border-radius: 2px; white-space: nowrap;
        }
        .contact-landlord { background-color: #fef3c7; color: #92400e; }
        .contact-num { font-size: 11px; color: #666; letter-spacing: 0.02em; }

        /* ── 금액 셀: 배지 + 금액 나란히 ── */
        .cell-price { text-align: left; min-width: 150px; }

        .price-line {
            display: flex; align-items: center;
            gap: 6px; margin-bottom: 4px;
        }

        /* 거래구분 배지 (금액 앞에 위치) */
        .badge-deal {
            display: inline-block;
            padding: 2px 7px; border-radius: 3px;
            font-size: 11px; font-weight: 700;
            color: #fff; white-space: nowrap;
            flex-shrink: 0;
        }
        .badge-sale    { background-color: var(--color-sale); }
        .badge-jeonse  { background-color: var(--color-jeonse); }
        .badge-monthly { background-color: var(--color-monthly); }
        .badge-short   { background-color: var(--color-short); }

        .price-amount { font-size: 13px; font-weight: 700; white-space: nowrap; }
        .price-amount-sale    { color: var(--color-sale); }
        .price-amount-jeonse  { color: var(--color-jeonse); }
        .price-amount-monthly { color: var(--color-monthly); }
        .price-amount-short   { color: var(--color-short); }

        /* ── 방수/면적 ── */
        .cell-spec { font-size: 12px; color: #555; white-space: nowrap; }

        /* ── 날짜 ── */
        .date-text { font-size: 12px; color: #888; }

        /* ── 등록자 셀 ── */
        .cell-registrar { text-align: left; min-width: 130px; }
        .member-badge {
            display: inline-block; padding: 1px 6px; border-radius: 3px;
            font-size: 10px; font-weight: 700; margin-bottom: 3px;
        }
        .mbadge-realtor { background-color: #dbeafe; color: var(--color-realtor); }
        .mbadge-general { background-color: #dcfce7; color: #166534; }
        .mbadge-admin   { background-color: #ffedd5; color: var(--color-admin); }

        .registrar-name  { font-size: 12px; font-weight: 700; color: #222; margin-bottom: 2px; }
        .registrar-phone { font-size: 11px; color: #888; }

        /* ── 관리 버튼 ── */
        .cell-actions { display: flex; gap: 4px; justify-content: center; }
        .btn-edit {
            padding: 3px 6px; font-size: 11px; border-radius: 3px;
            border: 1px solid #d1d5db; background: #fff; cursor: pointer;
            color: #333; font-family: inherit; font-weight: 500; transition: background 0.1s;
            white-space: nowrap;
        }
        .btn-edit:hover { background: #f3f4f6; }
        .btn-delete {
            padding: 3px 6px; font-size: 11px; border-radius: 3px;
            border: 1px solid #fecaca; background: #fff; cursor: pointer;
            color: #dc2626; font-family: inherit; font-weight: 500; transition: background 0.1s;
            white-space: nowrap;
        }
        .btn-delete:hover { background: #fef2f2; }

        /* ── 페이지네이션 ── */
        .pagination { display: flex; justify-content: center; margin-top: 32px; gap: 4px; }
        .page-link {
            width: 32px; height: 32px;
            display: flex; justify-content: center; align-items: center;
            border: 1px solid #d1d5db; border-radius: 4px;
            font-size: 13px; color: #666; text-decoration: none;
            background: #fff; cursor: pointer; transition: background 0.12s;
        }
        .page-link:hover { background-color: #f3f4f6; }
        .page-link.active { background-color: var(--dark-btn-bg); color: #fff; border-color: var(--dark-btn-bg); }

        input[type="checkbox"] { width: 15px; height: 15px; accent-color: #4285f4; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-card">

    <!-- ① 헤더 -->
    <div class="card-header">
        <h2>매물관리</h2>
        <span class="count-info">
            (<span class="ad-count">광고 -건</span> / <span class="total-count">전체 -건</span>)
        </span>
    </div>

    <!-- ② 검색 필터 -->
    <section class="filter-container">
        <div class="filter-group">
            <span class="filter-label">매물번호</span>
            <input type="text" class="filter-input" id="search-num" placeholder="매물번호 입력" style="width:130px;">
        </div>
        <div class="filter-divider"></div>
        <div class="filter-group">
            <span class="filter-label">매물종류</span>
            <select class="filter-input" id="search-type">
                <option value="">전체</option>
                <option>아파트</option>
                <option>빌라/주택</option>
                <option>오피스텔</option>
                <option>상가/사무실</option>
                <option>토지</option>
            </select>
        </div>
        <div class="filter-divider"></div>
        <div class="filter-group">
            <span class="filter-label">매물구분</span>
            <select class="filter-input" id="search-deal">
                <option value="">전체</option>
                <option>매매</option>
                <option>전세</option>
                <option>월세</option>
                <option>단기</option>
            </select>
        </div>
        <div class="filter-divider"></div>
        <div class="filter-group">
            <input type="text" class="filter-input" id="search-keyword" placeholder="검색어를 입력하세요." style="width:220px;">
        </div>
        <button class="btn-search" id="btn-do-search">🔍&nbsp;검색</button>
        <button class="btn-reset" id="btn-reset">초기화</button>
    </section>

    <!-- ③ 액션 바 -->
    <div class="action-bar">
        <div class="left-actions">
            <button class="btn btn-register" id="btn-add-property" onclick="window.location.href='register.html?v=' + new Date().getTime()">+ 공실등록</button>
            <button class="btn" id="btn-rank-refresh">⬆ 광고순위갱신</button>
            <button class="btn" id="btn-bulk-delete">🗑 선택삭제</button>
        </div>
        <div class="right-actions"></div>
    </div>

    <!-- ④ 매물 테이블 -->
    <!--
        컬럼 순서:
        체크 | 번호 | 광고설정/순위갱신일 | 매물종류 | 주소/임대인연락처 | 금액(배지+금액) | 방수/면적/층 | 최초등록 | 등록자/연락처 | 관리
    -->
    <div class="table-container">
        <table>
            <colgroup>
                <col style="width:44px;">
                <col style="width:80px;">   <!-- 번호 -->
                <col style="width:110px;">  <!-- 광고설정 -->
                <col style="width:90px;">   <!-- 매물종류 -->
                <col style="min-width:160px;"> <!-- 주소 -->
                <col style="width:170px;">  <!-- 금액 -->
                <col style="width:130px;">  <!-- 방수/면적/층 -->
                <col style="width:72px;">   <!-- 최초등록 -->
                <col style="width:150px;">  <!-- 등록자 -->
                <col style="width:90px;">   <!-- 관리 -->
            </colgroup>
            <thead>
                <tr>
                    <th><input type="checkbox" id="chk-all"></th>
                    <th>번호</th>
                    <th>광고설정</th>
                    <th>매물종류</th>
                    <th>주소 / 연락처</th>
                    <th>금액</th>
                    <th>방수/면적(m²)/층</th>
                    <th>최초등록</th>
                    <th>등록자/연락처</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="prop-list-body">
                <!-- 자바스크립트에서 동적으로 렌더링됩니다. -->
            </tbody>
        </table>
    </div>

    <!-- ⑤ 페이지네이션 -->
    <div class="pagination" id="pagination">
        <!-- 동적으로 페이지 생성 가능하도록 비워둠 -->
    </div>

</div>

<!-- Supabase SDK 및 설정 로드 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase_gongsi_config.js"></script>

<script>
    let allProperties = [];

    // 실행 (iframe 환경 대응)
    (async function init() {
        console.log("admin.html [init] started");
        const tbody = document.getElementById('prop-list-body');
        if (tbody) tbody.innerHTML = '<tr><td colspan="10" style="padding: 100px; color: #4285f4; font-weight: bold;">데이터를 불러오는 중입니다... 🔄</td></tr>';
        
        try {
            await loadProperties();
        } catch (e) {
            console.error("admin.html [init] critical error:", e);
            if (tbody) tbody.innerHTML = `<tr><td colspan="10" style="padding: 100px; color: #e53e3e; font-weight: bold;">초기화 중 오류가 발생했습니다: ${e.message}</td></tr>`;
        }
    })();

    // 매물 데이터 로드 및 렌더링
    async function loadProperties() {
        const supabase = window.gongsiClient;
        const tbody = document.getElementById('prop-list-body');
        
        if (!supabase) {
            console.error("Supabase client is not initialized.");
            if (tbody) tbody.innerHTML = '<tr><td colspan="10" style="padding: 100px; color: red;">Supabase 설정 오류! (config 확인 필요)</td></tr>';
            return;
        }

        const { data: { session }, error: sessionError } = await supabase.auth.getSession();
        
        if (sessionError) throw sessionError;
        
        if (!session) {
            console.warn("No active session found.");
            if (tbody) tbody.innerHTML = '<tr><td colspan="10" style="padding: 100px; color: #999;">로그인이 필요합니다.</td></tr>';
            setTimeout(() => {
                if (parent.window.location.href.indexOf('index.html') === -1) {
                    parent.window.location.href = 'index.html';
                }
            }, 2000);
            return;
        }

        const user = session.user;
        let query = supabase.from('properties').select('*');

        // 사용자 역할 확인 (본인 매물만 보여줄지 여부)
        const isUserAdminPath = window.parent.location.pathname.includes('user_admin.html');
        const ud = JSON.parse(localStorage.getItem('gongsil_user') || '{}');
        const userRole = ud.profile?.role || 'realtor'; 

        if (isUserAdminPath || (userRole !== 'admin' && userRole !== 'superadmin')) {
            query = query.eq('user_id', user.id);
        }

        const { data, error } = await query.order('created_at', { ascending: false });

        if (error) {
            console.error('Error fetching properties:', error);
            if (tbody) tbody.innerHTML = `<tr><td colspan="10" style="padding: 100px; color: red;">데이터 조회 중 오류: ${error.message}</td></tr>`;
            return;
        }

        allProperties = data || [];
        renderProperties(allProperties);
        updateCounts(allProperties);
    }

    function updateCounts(props) {
        const total = props.length;
        const activeCount = props.filter(p => p.status === 'active' || p.status === 'pending').length;
        
        const adCountEl = document.querySelector('.ad-count');
        const totalCountEl = document.querySelector('.total-count');
        
        if (adCountEl) adCountEl.textContent = `광고 ${activeCount}건`;
        if (totalCountEl) totalCountEl.textContent = `전체 ${total}건`;
    }

    function renderProperties(props) {
        const tbody = document.getElementById('prop-list-body');
        if (!tbody) return;
        tbody.innerHTML = '';
        
        if (props.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" style="padding: 100px; color: #999;">등록된 매물이 없습니다.</td></tr>';
            return;
        }

        props.forEach(p => {
            try {
                const tr = document.createElement('tr');
                
                const isAdOn = (p.status === 'active' || p.status === 'pending');
                const stateCls = isAdOn ? 'state-on' : 'state-off';
                const stateText = isAdOn ? '광고중' : '광고종료';
                
                let dealBadge = '';
                let priceText = '';
                let priceCls = '';
                
                const depositNum = Number(p.deposit || 0);
                const rentNum = Number(p.monthly_rent || 0);

                if (p.trade_type === '매매') {
                    dealBadge = '<span class="badge-deal badge-sale">매매</span>';
                    priceText = formatPrice(depositNum);
                    priceCls = 'price-amount-sale';
                } else if (p.trade_type === '전세') {
                    dealBadge = '<span class="badge-deal badge-jeonse">전세</span>';
                    priceText = formatPrice(depositNum);
                    priceCls = 'price-amount-jeonse';
                } else if (p.trade_type === '월세') {
                    dealBadge = '<span class="badge-deal badge-monthly">월세</span>';
                    priceText = `${formatPrice(depositNum)} / ${rentNum}`;
                    priceCls = 'price-amount-monthly';
                } else if (p.trade_type === '단기') {
                    dealBadge = '<span class="badge-deal badge-short">단기</span>';
                    priceText = `${formatPrice(depositNum)} / ${rentNum}`;
                    priceCls = 'price-amount-short';
                }

                const dateObj = new Date(p.created_at);
                const dateStr = (dateObj.getTime()) ? `${(dateObj.getMonth()+1).toString().padStart(2,'0')}.${dateObj.getDate().toString().padStart(2,'0')}` : '-';

                const roleBadgeCls = p.user_role === 'realtor' ? 'mbadge-realtor' : 'mbadge-general';
                const roleText = p.user_role === 'realtor' ? '부동산' : '일반인';

                tr.innerHTML = `
                    <td><input type="checkbox" name="prop_chk" value="${p.id}"></td>
                    <td><div class="cell-num">${p.id}</div></td>
                    <td>
                        <button class="btn-ad-toggle ${stateCls}" onclick="toggleAdStatus(${p.id}, '${p.status}')">${stateText}</button>
                        <div class="ad-date">${dateStr}</div>
                    </td>
                    <td>${p.property_type || '-'}</td>
                    <td class="cell-addr">
                        <div class="addr-main" style="cursor: pointer; cursor: hand;" onclick="window.open('gongsil.html?view_id=${p.id}', '_blank')" title="새 창에서 매물 상세 보기">${p.dong || ''} ${p.building_name || ''}</div>
                        <div class="contact-row">
                            <span class="contact-badge contact-landlord">임대인</span>
                            <span class="contact-num">${p.author_phone || '-'}</span>
                        </div>
                    </td>
                    <td class="cell-price">
                        <div class="price-line" style="cursor: pointer; cursor: hand;" onclick="window.open('gongsil.html?view_id=${p.id}', '_blank')" title="새 창에서 매물 상세 보기">
                            ${dealBadge}
                            <span class="price-amount ${priceCls}">${priceText}</span>
                        </div>
                    </td>
                    <td class="cell-spec">${p.room_count || '-'} / ${p.area || '-'}㎡ / ${p.room_number ? p.room_number + '호' : '-'}</td>
                    <td class="date-text">${dateStr}</td>
                    <td class="cell-registrar">
                        <div><span class="member-badge ${roleBadgeCls}">${roleText}</span></div>
                        <div class="registrar-name">${p.author_name || '-'}</div>
                        <div class="registrar-phone">${p.author_phone || '-'}</div>
                    </td>
                    <td>
                        <div class="cell-actions">
                            <button class="btn-edit" onclick="editProperty(${p.id})">수정</button>
                            <button class="btn-delete" onclick="deleteProperty(${p.id})">삭제</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            } catch (e) {
                console.error("매물 렌더링 오류 (ID: " + p.id + "):", e);
            }
        });
    }

    function formatPrice(val) {
        val = Number(val);
        if (!val || val === 0) return '0';
        if (val >= 10000) {
            const uk = Math.floor(val / 10000);
            const man = val % 10000;
            return man > 0 ? `${uk}억 ${man}` : `${uk}억`;
        }
        return val.toLocaleString();
    }

    window.toggleAdStatus = async function(id, currentStatus) {
        const nextStatus = (currentStatus === 'active' || currentStatus === 'pending') ? 'hidden' : 'active';
        const msg = nextStatus === 'active' ? "광고를 다시 시작할까요?" : "광고를 종료하시겠습니까?";
        if (!confirm(msg)) return;

        const { error } = await window.gongsiClient.from('properties').update({ status: nextStatus }).eq('id', id);
        if (error) alert("오류: " + error.message);
        else loadProperties();
    }

    window.deleteProperty = async function(id) {
        if (!confirm("삭제하시겠습니까?")) return;
        const { error } = await window.gongsiClient.from('properties').delete().eq('id', id);
        if (error) alert("오류: " + error.message);
        else { alert("삭제완료"); loadProperties(); }
    }

    window.editProperty = function(id) {
        window.location.href = `register.html?id=${id}&v=${new Date().getTime()}`;
    }

    document.getElementById('btn-do-search').addEventListener('click', () => {
        const num = document.getElementById('search-num').value.trim();
        const type = document.getElementById('search-type').value;
        const deal = document.getElementById('search-deal').value;
        const keyword = document.getElementById('search-keyword').value.trim().toLowerCase();

        const filtered = allProperties.filter(p => {
            const matchNum = num ? String(p.id).includes(num) : true;
            const matchType = type ? p.property_type === type : true;
            const matchDeal = deal ? p.trade_type === deal : true;
            const matchKeyword = keyword ? (
                (p.building_name || '').toLowerCase().includes(keyword) ||
                (p.dong || '').toLowerCase().includes(keyword) ||
                (p.author_name || '').toLowerCase().includes(keyword)
            ) : true;
            return matchNum && matchType && matchDeal && matchKeyword;
        });
        renderProperties(filtered);
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
        document.getElementById('search-num').value = '';
        document.getElementById('search-type').value = '';
        document.getElementById('search-deal').value = '';
        document.getElementById('search-keyword').value = '';
        renderProperties(allProperties);
    });

    document.getElementById('chk-all').addEventListener('change', function () {
        document.querySelectorAll('tbody input[type="checkbox"]').forEach(cb => cb.checked = this.checked);
    });

    document.getElementById('btn-add-property').addEventListener('click', () => {
        window.location.href = 'register.html?v=' + new Date().getTime();
    });
</script>
</body>
</html>
