<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기사뷰 - 공실뉴스 Admin</title>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_gongsi_config.js"></script>
    <style>
        :root {
            --primary: #ff9f1c;
            --blue: #3b82f6;
            --green: #16a34a;
            --red: #ef4444;
            --border: #e5e7eb;
            --bg: #f4f5f7;
            --text: #222;
            --sub: #666;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard Variable', -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.6;
        }

        /* ── 상단 툴바 ── */
        .view-toolbar {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .toolbar-title { font-size: 16px; font-weight: 700; color: #111; }
        .toolbar-actions { display: flex; gap: 8px; align-items: center; }
        .btn-toolbar {
            padding: 6px 14px; border-radius: 5px; border: 1px solid var(--border);
            font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
            background: #fff; color: #444; transition: all .15s;
        }
        .btn-toolbar:hover { background: #f3f4f6; }
        .btn-toolbar.blue { background: var(--blue); color: #fff; border-color: var(--blue); }
        .btn-toolbar.blue:hover { background: #2563eb; }
        .btn-toolbar.green { background: var(--green); color: #fff; border-color: var(--green); }
        .btn-toolbar.orange { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* 디바이스 미리보기 버튼 */
        .device-btns { display: flex; gap: 4px; background: #f3f4f6; padding: 4px; border-radius: 6px; }
        .device-btn {
            padding: 4px 10px; border-radius: 4px; border: none;
            background: transparent; cursor: pointer; font-size: 16px; transition: background .15s;
        }
        .device-btn.active, .device-btn:hover { background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.1); }

        /* ── 메인 레이아웃 ── */
        .page-body {
            display: flex;
            gap: 16px;
            padding: 20px 24px;
            max-width: 1280px;
            margin: 0 auto;
        }

        /* ── 기사 본문 영역 ── */
        .article-main {
            flex: 1;
            min-width: 0;
        }

        .article-card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08);
            overflow: hidden;
        }

        /* 브레드크럼 */
        .breadcrumb {
            padding: 10px 20px;
            font-size: 12px;
            color: var(--sub);
            border-bottom: 1px solid #f0f0f0;
        }
        .breadcrumb a { color: var(--sub); text-decoration: none; }
        .breadcrumb span { color: #999; margin: 0 4px; }

        /* 기사 헤더 */
        .article-header { padding: 24px 24px 16px; }
        .article-title {
            font-size: 26px;
            font-weight: 800;
            color: #111;
            line-height: 1.4;
            margin-bottom: 16px;
        }
        .article-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: var(--sub);
            border-top: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
            padding: 10px 0;
        }
        .meta-item { display: flex; align-items: center; gap: 4px; }
        .meta-divider { color: #ddd; }
        .meta-actions { margin-left: auto; display: flex; gap: 8px; }
        .meta-action-btn {
            padding: 4px 12px; border-radius: 14px; border: 1px solid var(--border);
            font-size: 12px; background: #fff; cursor: pointer; color: #555;
            font-family: inherit; transition: background .12s;
        }
        .meta-action-btn:hover { background: #f3f4f6; }

        /* 기사 상태 배지 */
        .badge-status {
            display: inline-block; padding: 4px 12px; border-radius: 4px;
            font-size: 11px; font-weight: 700; color: #fff;
        }
        .status-published { background: var(--green); }
        .status-pending   { background: var(--blue); }
        .status-draft     { background: #f59e0b; }
        .status-hidden    { background: var(--red); }

        /* 기사 본문 */
        .article-body {
            padding: 24px;
            font-size: 15px;
            line-height: 1.9;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }
        .article-body img { max-width: 100%; height: auto; border-radius: 6px; margin: 12px 0; }
        .article-body figure { text-align: center; margin: 16px 0; }
        .article-body figcaption { font-size: 12px; color: var(--sub); margin-top: 6px; }

        /* 관련기사 */
        .related-section { padding: 20px 24px; border-bottom: 1px solid #f0f0f0; }
        .related-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: #333; }
        .related-empty { font-size: 13px; color: #aaa; padding: 10px 0; }

        /* 기자 정보 */
        .reporter-box {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .reporter-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #ff9f1c, #f97316);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 700; color: #fff; flex-shrink: 0;
        }
        .reporter-info h4 { font-size: 14px; font-weight: 700; }
        .reporter-info p { font-size: 12px; color: var(--sub); }
        .reporter-link { margin-left: auto; font-size: 12px; color: var(--blue); text-decoration: none; }

        /* 댓글 섹션 */
        .comment-section { padding: 20px 24px; }
        .comment-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
        .comment-header h3 { font-size: 15px; font-weight: 700; }
        .comment-count { font-size: 13px; color: var(--sub); }
        .comment-input-box {
            border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 14px;
        }
        .comment-input-top {
            display: flex; align-items: center; gap: 8px; padding: 10px 14px;
            border-bottom: 1px solid #f0f0f0;
        }
        .commenter-name { font-size: 13px; font-weight: 600; color: #333; }
        .comment-textarea {
            width: 100%; border: none; outline: none; resize: none;
            padding: 12px 14px; font-family: inherit; font-size: 14px;
            color: #333; min-height: 80px; display: block;
        }
        .comment-input-footer {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 14px; border-top: 1px solid #f0f0f0; background: #fafafa;
        }
        .char-count { font-size: 12px; color: #aaa; }
        .btn-submit-comment {
            background: var(--blue); color: #fff; border: none;
            padding: 6px 16px; border-radius: 5px; font-size: 13px;
            font-weight: 600; cursor: pointer; font-family: inherit;
        }
        .comment-sort { display: flex; gap: 8px; margin-bottom: 12px; }
        .sort-btn {
            padding: 4px 10px; border: 1px solid var(--border); border-radius: 12px;
            font-size: 12px; background: #fff; cursor: pointer; font-family: inherit;
        }
        .sort-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
        .comment-empty { text-align: center; color: #aaa; padding: 30px 0; font-size: 13px; }
        .comment-list { display: flex; flex-direction: column; gap: 12px; }
        .comment-item {
            border: 1px solid #f0f0f0; border-radius: 8px; padding: 12px 14px;
        }
        .comment-item-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .comment-author { font-size: 13px; font-weight: 600; }
        .comment-date { font-size: 12px; color: #aaa; margin-left: auto; }
        .comment-text { font-size: 14px; color: #444; }

        /* ── 우측 사이드바 ── */
        .article-sidebar {
            width: 280px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .sidebar-card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08);
            overflow: hidden;
        }
        .sidebar-card-title {
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 700;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
            background: #fafafa;
        }
        .sidebar-memo {
            padding: 10px 14px;
        }
        .sidebar-memo textarea {
            width: 100%; border: 1px solid var(--border); border-radius: 6px;
            padding: 8px 10px; font-family: inherit; font-size: 13px;
            resize: none; outline: none; min-height: 70px; color: #333;
        }
        .sidebar-memo textarea::placeholder { color: #bbb; }
        .sidebar-memo-footer { display: flex; justify-content: flex-end; margin-top: 8px; }
        .btn-sidebar-action {
            background: #4b5563; color: #fff; border: none;
            padding: 6px 16px; border-radius: 5px; font-size: 12px;
            font-weight: 600; cursor: pointer; font-family: inherit;
        }
        .sidebar-log-list { padding: 0; }
        .log-item {
            display: flex; gap: 10px; align-items: flex-start;
            padding: 10px 16px; border-bottom: 1px solid #f9f9f9;
        }
        .log-num {
            width: 20px; height: 20px; border-radius: 50%;
            background: var(--blue); color: #fff; font-size: 11px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px;
        }
        .log-content { flex: 1; min-width: 0; }
        .log-title { font-size: 13px; font-weight: 600; color: #333; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .log-meta { font-size: 11px; color: #aaa; margin-top: 2px; }
        .log-desc { font-size: 12px; color: #666; margin-top: 2px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .log-empty { padding: 20px 16px; text-align: center; color: #bbb; font-size: 13px; }

        /* 관리 액션 버튼 그룹 */
        .admin-actions { padding: 14px 16px; display: flex; flex-direction: column; gap: 6px; }
        .admin-actions .btn-full {
            width: 100%; padding: 8px; border-radius: 5px; border: none;
            font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
        }
        .btn-edit   { background: var(--blue); color: #fff; }
        .btn-delete { background: #fee2e2; color: var(--red); }
        .btn-approve{ background: #dcfce7; color: var(--green); }

        /* 미리보기 컨테이너 */
        .preview-frame { width: 100%; transition: max-width .3s; }
        .preview-frame.tablet  { max-width: 768px; margin: 0 auto; }
        .preview-frame.mobile  { max-width: 390px; margin: 0 auto; }

        /* 로딩 */
        .loading { text-align: center; padding: 60px 20px; color: #aaa; font-size: 16px; }
    </style>
</head>
<body>

<!-- 상단 툴바 -->
<div class="view-toolbar">
    <div class="toolbar-title">📰 기사뷰</div>
    <div class="toolbar-actions">
        <div class="device-btns">
            <button class="device-btn active" id="devPC" onclick="setDevice('pc')"   title="PC">🖥️</button>
            <button class="device-btn"         id="devTB" onclick="setDevice('tablet')" title="태블릿">📱</button>
            <button class="device-btn"         id="devMB" onclick="setDevice('mobile')" title="모바일">📲</button>
        </div>
        <button class="btn-toolbar" onclick="goBack()">← 목록</button>
        <button class="btn-toolbar blue" id="btnEdit" onclick="goEdit()">✏️ 수정</button>
        <button class="btn-toolbar" id="btnApprove" onclick="approveArticle()" style="background:#dcfce7;color:#16a34a;border-color:#bbf7d0;">✅ 승인</button>
        <button class="btn-toolbar" style="background:#fee2e2;color:#ef4444;border-color:#fecaca;" onclick="deleteArticle()">🗑️ 삭제</button>
    </div>
</div>

<!-- 메인 레이아웃 -->
<div class="page-body" id="pageBody">
    <div class="loading" id="loadingMsg">⏳ 기사를 불러오는 중...</div>
</div>

<script>
var sb = window.gongsiClient;
var articleId = null;
var articleData = null;
var mediaList   = [];
var commentList = [];

// ── 기기 미리보기 ──────────────────────────────────
function setDevice(type) {
    ['pc','tablet','mobile'].forEach(function(d) {
        document.getElementById('dev'+d.toUpperCase().replace('TABLET','TB').replace('MOBILE','MB').replace('PC','PC')).classList.remove('active');
    });
    document.getElementById({pc:'devPC',tablet:'devTB',mobile:'devMB'}[type]).classList.add('active');
    var frame = document.getElementById('previewFrame');
    if (frame) {
        frame.className = 'preview-frame ' + (type !== 'pc' ? type : '');
    }
}

// ── 페이지 진입 ───────────────────────────────────
async function init() {
    var params = new URLSearchParams(window.location.search);
    articleId = parseInt(params.get('id'));
    if (!articleId) {
        document.getElementById('loadingMsg').textContent = '기사 ID가 없습니다.';
        return;
    }

    // Supabase 대기
    await waitForSb();

    // 기사 로드
    var res = await sb.from('articles').select('*').eq('id', articleId).single();
    if (res.error || !res.data) {
        document.getElementById('loadingMsg').textContent = '기사를 불러올 수 없습니다: ' + (res.error ? res.error.message : '');
        return;
    }
    articleData = res.data;

    // 미디어 로드
    var mRes = await sb.from('article_media').select('*').eq('article_id', articleId).order('sort_order');
    mediaList = mRes.data || [];

    // 조회수 1 증가 (fire-and-forget)
    sb.from('articles').update({ view_count: (articleData.view_count || 0) + 1 }).eq('id', articleId);

    render();
}

function waitForSb() {
    return new Promise(function(resolve) {
        var t = setInterval(function() {
            if (window.gongsiClient) { sb = window.gongsiClient; clearInterval(t); resolve(); }
        }, 100);
    });
}

// ── 메인 렌더 ─────────────────────────────────────
function render() {
    var a = articleData;
    var statusMap = {
        published: { cls: 'status-published', label: '승인' },
        pending:   { cls: 'status-pending',   label: '승인신청' },
        draft:     { cls: 'status-draft',     label: '작성중' },
        hidden:    { cls: 'status-hidden',    label: '반려' }
    };
    var si = statusMap[a.status] || { cls: 'status-draft', label: a.status };

    var pubDate = a.created_at ? new Date(a.created_at).toLocaleString('ko-KR') : '-';
    var updDate = a.updated_at ? new Date(a.updated_at).toLocaleString('ko-KR') : '-';

    // 브레드크럼
    var crumb = 'HOME <span>›</span> 공실뉴스'
        + (a.section1 ? ' <span>›</span> ' + escHtml(a.section1) : '')
        + (a.section2 ? ' <span>›</span> ' + escHtml(a.section2) : '');

    // 대표 이미지
    var repImg = mediaList.find(function(m){ return m.is_representative; }) || mediaList[0];

    // 본문 빌드
    var bodyHtml = a.content || '';
    // 이미지가 본문에 없고 미디어가 있으면 추가 표시
    if (!bodyHtml && mediaList.length) {
        bodyHtml = mediaList.map(function(m) {
            if (m.media_type === 'image') {
                return '<figure><img src="'+escHtml(m.url)+'" alt=""><figcaption>'+(m.caption||'')+'</figcaption></figure>';
            } else if (m.media_type === 'youtube') {
                return '<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:8px;margin:16px 0"><iframe src="'+escHtml(m.url)+'" style="position:absolute;top:0;left:0;width:100%;height:100%;" frameborder="0" allowfullscreen></iframe></div>';
            }
            return '';
        }).join('');
    }

    // ── HTML 조립 ──
    document.getElementById('pageBody').innerHTML =
    '<div class="preview-frame" id="previewFrame">'+
      '<div class="article-card">'+
        '<div class="breadcrumb">'+crumb+'</div>'+
        '<div class="article-header">'+
          '<h1 class="article-title">'+escHtml(a.title||'(제목 없음)')+'</h1>'+
          (a.subtitle ? '<p style="color:#555;font-size:15px;margin-bottom:12px;">'+escHtml(a.subtitle)+'</p>' : '')+
          '<div class="article-meta">'+
            '<div class="meta-item">✍️ <strong>'+(a.reporter_name||'공실뉴스')+'</strong></div>'+
            '<span class="meta-divider">|</span>'+
            '<div class="meta-item">📅 작성 '+pubDate+'</div>'+
            '<span class="meta-divider">|</span>'+
            '<div class="meta-item">🔄 수정 '+updDate+'</div>'+
            '<span class="meta-divider">|</span>'+
            '<div class="meta-item">👁️ 조회 '+(a.view_count||0)+'</div>'+
            '<div class="meta-actions">'+
              '<span class="badge-status '+si.cls+'">'+si.label+'</span>'+
              '<button class="meta-action-btn" onclick="shareArticle()">🔗 공유</button>'+
              '<button class="meta-action-btn" style="color:var(--primary);">⭐ 기사평가</button>'+
            '</div>'+
          '</div>'+
        '</div>'+
        '<div class="article-body">'+bodyHtml+'</div>'+
        '<div class="related-section">'+
          '<div class="related-title">📎 관련기사</div>'+
          '<div class="related-empty">연결된 관련기사가 없습니다.</div>'+
        '</div>'+
        '<div class="reporter-box">'+
          '<div class="reporter-avatar">뉴</div>'+
          '<div class="reporter-info">'+
            '<h4>'+(a.reporter_name||'공실뉴스')+'</h4>'+
            '<p>'+(a.reporter_email||'')+'</p>'+
          '</div>'+
          '<a class="reporter-link" href="#">기자의 다른 기사 보기 →</a>'+
        '</div>'+
        '<div class="comment-section">'+
          '<div class="comment-header">'+
            '<h3>댓글</h3><span class="comment-count">0개</span>'+
          '</div>'+
          '<div class="comment-input-box">'+
            '<div class="comment-input-top">'+
              '<span class="commenter-name">🙂 '+(a.reporter_name||'공실뉴스')+'</span>'+
            '</div>'+
            '<textarea class="comment-textarea" id="commentInput" placeholder="독자 여러분의 소중한 댓글을 남겨주세요. 광고성 댓글 및 비방·욕설·도배는 삭제 될 수 있습니다."></textarea>'+
            '<div class="comment-input-footer">'+
              '<span class="char-count" id="charCount">0자</span>'+
              '<button class="btn-submit-comment">등록</button>'+
            '</div>'+
          '</div>'+
          '<div class="comment-sort">'+
            '<button class="sort-btn active">최신순</button>'+
            '<button class="sort-btn">추천순</button>'+
            '<button class="sort-btn">답글순</button>'+
          '</div>'+
          '<div class="comment-empty">아직 댓글이 없습니다. 첫 번째 댓글을 남겨보세요!</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    // ── 우측 사이드바 ──
    '<div class="article-sidebar">'+
      '<div class="sidebar-card">'+
        '<div class="sidebar-card-title">⚙️ 관리 액션</div>'+
        '<div class="admin-actions">'+
          '<button class="btn-full btn-edit"    onclick="goEdit()">✏️ 기사 수정</button>'+
          buildApproveBtn(a.status)+
          '<button class="btn-full btn-delete"  onclick="deleteArticle()">🗑️ 기사 삭제</button>'+
        '</div>'+
      '</div>'+
      '<div class="sidebar-card">'+
        '<div class="sidebar-card-title">📋 기사 서비스 로그</div>'+
        '<div class="sidebar-memo">'+
          '<textarea id="logMemoInput" placeholder="서비스 메모를 입력하세요..."></textarea>'+
          '<div class="sidebar-memo-footer"><button class="btn-sidebar-action" onclick="addServiceLog()">등록</button></div>'+
        '</div>'+
        '<ul class="sidebar-log-list" id="serviceLogList">'+
          '<li class="log-empty">서비스 로그가 없습니다.</li>'+
        '</ul>'+
      '</div>'+
      '<div class="sidebar-card">'+
        '<div class="sidebar-card-title">🕐 기사 최근 로그</div>'+
        '<ul class="sidebar-log-list" id="recentLogList">'+buildRecentLog(a)+'</ul>'+
      '</div>'+
      '<div class="sidebar-card" style="padding:0;">'+
        '<div class="sidebar-card-title">📊 기사 정보</div>'+
        '<div style="padding:14px 16px;display:flex;flex-direction:column;gap:8px;font-size:13px;">'+
          '<div style="display:flex;justify-content:space-between;"><span style="color:#888;">형태</span><strong>'+typeLabel(a.article_type)+'</strong></div>'+
          '<div style="display:flex;justify-content:space-between;"><span style="color:#888;">1차섹션</span><strong>'+(a.section1||'-')+'</strong></div>'+
          '<div style="display:flex;justify-content:space-between;"><span style="color:#888;">2차섹션</span><strong>'+(a.section2||'-')+'</strong></div>'+
          '<div style="display:flex;justify-content:space-between;"><span style="color:#888;">조회수</span><strong>'+(a.view_count||0)+'</strong></div>'+
          '<div style="display:flex;justify-content:space-between;"><span style="color:#888;">미디어</span><strong>'+mediaList.length+'개</strong></div>'+
          (a.keywords ? '<div style="padding-top:6px;border-top:1px solid #f0f0f0;"><span style="color:#888;">키워드</span><br><span style="color:#555;margin-top:4px;display:block;">'+escHtml(a.keywords)+'</span></div>' : '')+
        '</div>'+
      '</div>'+
    '</div>';

    // 댓글 글자수 카운터
    var ta = document.getElementById('commentInput');
    if (ta) ta.addEventListener('input', function() {
        document.getElementById('charCount').textContent = ta.value.length + '자';
    });

    // 정렬버튼 토글
    document.querySelectorAll('.sort-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.sort-btn').forEach(function(b){ b.classList.remove('active'); });
            btn.classList.add('active');
        });
    });
}

function buildApproveBtn(status) {
    if (status === 'published') {
        return '<button class="btn-full" style="background:#f3f4f6;color:#666;" onclick="changeStatus(\'hidden\')">🚫 기사 숨기기</button>';
    }
    return '<button class="btn-full btn-approve" onclick="changeStatus(\'published\')" style="background:#dcfce7;color:#16a34a;">✅ 기사 승인</button>';
}

function buildRecentLog(a) {
    var logs = [
        { label: '작성', date: a.created_at },
        { label: '최근 수정', date: a.updated_at }
    ];
    return logs.filter(function(l){ return l.date; }).map(function(l, i) {
        return '<li class="log-item">'+
          '<div class="log-num">'+(i+1)+'</div>'+
          '<div class="log-content">'+
            '<div class="log-title">'+l.label+'</div>'+
            '<div class="log-meta">'+ new Date(l.date).toLocaleString('ko-KR') +'</div>'+
          '</div>'+
        '</li>';
    }).join('');
}

function typeLabel(t) {
    return { normal: '일반뉴스', card: '카드뉴스', gallery: '갤러리' }[t] || t || '-';
}

// ── 관리 기능 ─────────────────────────────────────
function goBack() {
    if (window.parent && window.parent.loadPage) {
        window.parent.loadPage(null, '기사관리', 'article_admin.html');
    } else { history.back(); }
}

function goEdit() {
    if (!articleId) return;
    if (window.parent && window.parent.loadPage) {
        window.parent.loadPage(null, '기사수정', 'news_write.html?editId=' + articleId);
    } else {
        window.location.href = 'news_write.html?editId=' + articleId;
    }
}

async function changeStatus(newStatus) {
    var label = { published: '승인', hidden: '숨기기' }[newStatus] || newStatus;
    if (!confirm('기사를 [' + label + '] 상태로 변경하시겠습니까?')) return;
    var res = await sb.from('articles').update({ status: newStatus }).eq('id', articleId);
    if (res.error) { alert('상태 변경 실패: ' + res.error.message); return; }
    articleData.status = newStatus;
    render();
}

async function deleteArticle() {
    var title = articleData ? articleData.title : '이 기사';
    if (!confirm('[❌ 삭제 확인]\n\n"' + title + '"\n\n기사를 영구적으로 삭제합니다.\n\n정말 삭제하시겠습니까?')) return;
    var res = await sb.from('articles').delete().eq('id', articleId);
    if (res.error) { alert('삭제 실패: ' + res.error.message); return; }
    alert('삭제되었습니다.');
    goBack();
}

function approveArticle() { changeStatus('published'); }

function shareArticle() {
    var url = window.location.href;
    if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(function() { alert('URL이 클립보드에 복사되었습니다.'); });
    } else { prompt('아래 URL을 복사하세요:', url); }
}

var serviceLogData = [];
function addServiceLog() {
    var input = document.getElementById('logMemoInput');
    var memo = input ? input.value.trim() : '';
    if (!memo) { alert('메모를 입력하세요.'); return; }
    serviceLogData.unshift({ text: memo, date: new Date() });
    input.value = '';
    renderServiceLog();
}

function renderServiceLog() {
    var ul = document.getElementById('serviceLogList');
    if (!ul) return;
    if (!serviceLogData.length) {
        ul.innerHTML = '<li class="log-empty">서비스 로그가 없습니다.</li>';
        return;
    }
    ul.innerHTML = serviceLogData.map(function(l, i) {
        return '<li class="log-item">'+
          '<div class="log-num">'+(i+1)+'</div>'+
          '<div class="log-content">'+
            '<div class="log-title">'+escHtml(l.text)+'</div>'+
            '<div class="log-meta">'+l.date.toLocaleString('ko-KR')+'</div>'+
          '</div></li>';
    }).join('');
}

function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 실행 ────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
    setTimeout(init, 400);
});
</script>
