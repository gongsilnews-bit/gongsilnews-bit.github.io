        // 2м°??¬мқҙ?ңл°”) ?ңм„ұ??

        // мўҢмёЎ ?¬мқҙ?ңл°” кІҖ??? к?
        function toggleSideSearch() {
            document.getElementById('sideSearchBox').classList.toggle('open');
        }
        // кёҖлЎңлІҢ кІҖ?үкё°??? к?
        window.toggleGlobalSearchPanel = function() {
            const panel = document.getElementById('globalSearchPanel');
            const iconClosed = document.getElementById('iconSearchClosed');
            const iconOpened = document.getElementById('iconSearchOpened');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
                if(iconClosed) iconClosed.style.display = 'none';
                if(iconOpened) iconOpened.style.display = 'inline-block';
                setTimeout(() => document.getElementById('globalKeywordInput').focus(), 100);
            } else {
                panel.style.display = 'none';
                if(iconClosed) iconClosed.style.display = 'inline-block';
                if(iconOpened) iconOpened.style.display = 'none';
                document.getElementById('globalKeywordInput').value = '';
            }
        };
        window.executeGlobalSearch = function() {
            const kw = document.getElementById('globalKeywordInput').value.trim();
            if(!kw) {
                alert("кІҖ?үм–ҙлҘ??…л Ҙ?ҙмЈј?ёмҡ”.");
                return;
            }
            alert("[" + kw + "] ?ҙмҡ©??кІҖ?үн•©?ҲлӢӨ.");
            window.toggleGlobalSearchPanel();
        };
    </script>
