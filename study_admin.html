<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스터디관리 - 공실뉴스 Admin</title>
    <!-- 구글 폰트 적용 (Pretendard) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 필요시 사용할 외부 설정 파일 -->
    <script src="base_path.js"></script>
    <script src="supabase_gongsi_config.js"></script>
    
    <style>
        :root {
            --primary-color: #ff9f1c;   /* 스터디 테마에 맞춘 오렌지 포인트 */
            --primary-hover: #e08b17;
            --bg-body: #f4f5f7;
            --bg-card: #ffffff;
            --border-color: #e1e4e8;
            --text-main: #333333;
            --text-sub: #666666;
            --filter-bg: #fffbf5; /* 옅은 주황빛 필터박스 */
            --dark-btn-bg: #4b5563;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-body);
            padding: 24px;
            margin: 0;
            color: var(--text-main);
            line-height: 1.5;
        }

        .admin-card {
            background-color: var(--bg-card);
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            padding: 32px;
            min-height: 800px;
        }

        /* ── 헤더 ── */
        .card-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 24px; }
        .card-header h2 { margin: 0; font-size: 1.25rem; font-weight: 700; color: #111; }
        .card-header .count-info { font-size: 13px; color: #666; display: flex; gap: 6px; }
        .card-header .count-info span { font-weight: 500; }
        .card-header .count-info span.bold { font-weight: 700; }
        
        /* 상태별 텍스트 색상 */
        .count-publish { color: #16a34a; }
        .count-draft { color: #d97706; }
        .count-reject { color: #64748b; }

        /* ── 필터 ── */
        .filter-container {
            background-color: var(--filter-bg);
            border-radius: 6px;
            padding: 18px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            border: 1px solid #fee2e2;
        }
        .filter-group { display: flex; align-items: center; gap: 6px; }
        .filter-label { font-size: 13px; font-weight: 600; color: #555; white-space: nowrap; }

        .filter-input {
            padding: 7px 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 13px;
            background-color: #fff;
            outline: none;
            font-family: inherit;
            color: var(--text-main);
        }
        .filter-input:focus { border-color: var(--primary-color); }
        select.filter-input { cursor: pointer; }

        .btn-search {
            background-color: var(--dark-btn-bg);
            color: white; border: none;
            padding: 7px 14px; border-radius: 4px;
            font-size: 13px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 4px;
            transition: background 0.15s;
        }
        .btn-search:hover { background-color: #374151; }

        .btn-reset {
            background-color: #fff; color: #666;
            border: 1px solid #d1d5db;
            padding: 7px 14px; border-radius: 4px;
            font-size: 13px; cursor: pointer;
            transition: background 0.15s;
        }
        .btn-reset:hover { background-color: #f9fafb; }

        /* ── 액션 바 ── */
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .left-actions { display: flex; gap: 6px; align-items: center; }

        .btn {
            padding: 6px 12px; font-size: 13px; font-weight: 500;
            border-radius: 4px; border: 1px solid #d1d5db;
            background: #fff; cursor: pointer;
            display: inline-flex; align-items: center; gap: 4px;
            color: #333; transition: background 0.15s;
        }
        .btn:hover { background-color: #f3f4f6; }

        /* 버튼 컬러를 오렌지 포인트로 유지 */
        .btn-write {
            background-color: var(--primary-color); color: white;
            border: none; padding: 8px 18px;
            font-weight: 700; font-size: 13px;
            display: inline-flex; align-items: center; gap: 4px;
            border-radius: 4px; transition: background 0.15s;
            cursor: pointer;
        }
        .btn-write:hover { background-color: var(--primary-hover); }

        /* ── 테이블 ── */
        .table-container { width: 100%; overflow-x: auto; border-top: 2px solid #333; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 900px; }
        th { background-color: #fafafa; border-bottom: 1px solid #e5e7eb; padding: 12px 10px; font-weight: 700; color: #333; text-align: center; white-space: nowrap; }
        td { padding: 14px 10px; border-bottom: 1px solid #f1f3f5; text-align: center; vertical-align: middle; color: #444; }
        tr:hover td { background-color: #fff7ed; }

        .cell-title { text-align: left; font-weight: 600; color: #111; cursor: pointer; }
        .cell-title:hover { text-decoration: underline; color: var(--primary-color); }
        .cell-price { font-weight: 600; color: #ea580c; } /* 가격 포인트 컬러 */

        /* ── 상태 배지 ── */
        .badge-status {
            display: inline-block; padding: 4px 12px; border-radius: 4px;
            font-size: 11px; font-weight: 700; color: #fff; white-space: nowrap;
        }
        .status-published  { background-color: #16a34a; } /* 판매중 */
        .status-draft   { background-color: #fbbf24; } /* 임시저장 */
        .status-hidden  { background-color: #64748b; } /* 숨김 */

        /* ── 관리 버튼 ── */
        .btn-edit {
            padding: 3px 6px; font-size: 11px; border-radius: 3px;
            border: 1px solid #d1d5db; background: #fff; cursor: pointer;
            color: #333; font-weight: 500; transition: background 0.1s; margin-right: 4px;
        }
        .btn-edit:hover { background: #f3f4f6; }
        .btn-delete {
            padding: 3px 6px; font-size: 11px; border-radius: 3px;
            border: 1px solid #fecaca; background: #fff; cursor: pointer;
            color: #dc2626; font-weight: 500; transition: background 0.1s;
        }
        .btn-delete:hover { background: #fef2f2; }

        /* ── 페이지네이션 ── */
        .pagination { display: flex; justify-content: center; margin-top: 32px; gap: 4px; }
        .page-link {
            width: 32px; height: 32px;
            display: flex; justify-content: center; align-items: center;
            border: 1px solid #d1d5db; border-radius: 4px;
            font-size: 13px; color: #666; text-decoration: none;
            background: #fff; cursor: pointer; transition: background 0.12s;
        }
        .page-link:hover { background-color: #f3f4f6; }
        .page-link.active { background-color: var(--dark-btn-bg); color: #fff; border-color: var(--dark-btn-bg); }
    </style>
</head>
<body>

<div class="admin-card">
    <!-- 타이틀 영역 -->
    <div class="card-header">
        <h2>스터디목록 (강의관리)</h2>
        <div class="count-info">
            ( <span class="count-publish">판매중 <span class="bold" id="cntPublish">2</span>건</span> / 
            <span class="count-draft">임시저장 <span class="bold" id="cntDraft">1</span>건</span> / 
            <span class="count-reject">숨김처리 <span class="bold" id="cntHidden">0</span>건</span> )
        </div>
    </div>

    <!-- 검색/필터 영역 -->
    <div class="filter-container">
        <div class="filter-group">
            <span class="filter-label">진행상황</span>
            <select class="filter-input" id="filterStatus">
                <option value="all">전체</option>
                <option value="published">판매중</option>
                <option value="draft">임시저장</option>
                <option value="hidden">숨김처리</option>
            </select>
        </div>
        
        <div class="filter-group" style="flex:1;">
            <input type="text" id="filterKeyword" class="filter-input" placeholder="강의명을 검색하세요." style="width: 100%; max-width: 300px;">
        </div>

        <button class="btn-search" onclick="alert('검색 필터 기능은 DB 연동 후 작동합니다.')">🔍 검색</button>
        <button class="btn-reset" onclick="alert('초기화 클릭됨')">초기화</button>
    </div>

    <!-- 액션 및 유틸 버튼 영역 -->
    <div class="action-bar">
        <div class="left-actions">
            <!-- 🌟 핵심: 클릭 시 방금 작업한 study_write.html 로 이동 -->
            <button onclick="window.parent.loadPage(null, '새 강의 등록', 'study_write.html')" class="btn-write">+ 새 강의 등록</button>
            <button class="btn" onclick="alert('선택삭제 처리')">🗑️ 선택삭제</button>
        </div>
    </div>

    <!-- 테이블 리스트 -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 40px;"><input type="checkbox" id="checkAll" onchange="toggleAll(this)"></th>
                    <th style="width: 100px;">공개상태</th>
                    <th>강의명</th>
                    <th style="width: 140px;">수강료(포인트)</th>
                    <th style="width: 150px;">최초등록일</th>
                    <th style="width: 90px;">관리</th>
                </tr>
            </thead>
            <tbody id="studyTableBody">
                <!-- 더미 데이터로 기사관리와 똑같이 보이게 랜더링 (추후 Supabase 연동) -->
                <tr>
                  <td><input type="checkbox" class="row-check"></td>
                  <td><span class="badge-status status-published">판매중</span></td>
                  <td class="cell-title" onclick="window.parent.loadPage(null, '강의수정', 'study_write.html')">[2026 개정] 노션으로 끝내는 실전 시스템: 템플릿 제공</td>
                  <td class="cell-price">195,000 P</td>
                  <td class="date-text">2026-03-31 15:30</td>
                  <td style="white-space:nowrap;">
                      <button class="btn-edit" onclick="window.parent.loadPage(null, '강의수정', 'study_write.html')">수정</button>
                      <button class="btn-delete">삭제</button>
                  </td>
                </tr>
                <tr>
                  <td><input type="checkbox" class="row-check"></td>
                  <td><span class="badge-status status-draft">임시저장</span></td>
                  <td class="cell-title" onclick="window.parent.loadPage(null, '강의수정', 'study_write.html')">상가/토지 중개 실무 마스터 클래스 (가안)</td>
                  <td class="cell-price">비공개</td>
                  <td class="date-text">2026-03-30 09:22</td>
                  <td style="white-space:nowrap;">
                      <button class="btn-edit" onclick="window.parent.loadPage(null, '강의수정', 'study_write.html')">수정</button>
                      <button class="btn-delete">삭제</button>
                  </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- 페이징 마크업 -->
    <div class="pagination" id="paginationArea">
        <a href="#" class="page-link" style="border:none;" onclick="return false;">&lt;</a>
        <span id="pageLinks" style="display:flex; gap:4px;">
            <a href="#" class="page-link active">1</a>
        </span>
        <a href="#" class="page-link" style="border:none;" onclick="return false;">&gt;</a>
    </div>
</div>

<script>
    // 전체 선택/토글
    function toggleAll(chk) {
        document.querySelectorAll('.row-check').forEach(function(c){ c.checked = chk.checked; });
    }
</script>

</body>
</html>
