<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기사관리 - 공실뉴스 Admin</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable.css" />
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_gongsi_config.js"></script>
    <style>
        :root {
            --primary-color: #ff9f1c;
            --bg-body: #f4f5f7;
            --bg-card: #ffffff;
            --border-color: #e1e4e8;
            --text-main: #333333;
            --text-sub: #666666;
            --blue-filter-bg: #f0f4fc;
            --dark-btn-bg: #4b5563;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-body);
            padding: 24px;
            margin: 0;
            color: var(--text-main);
            line-height: 1.5;
        }

        .admin-card {
            background-color: var(--bg-card);
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            padding: 32px;
            min-height: 800px;
        }

        /* ── 헤더 ── */
        .card-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 24px; }
        .card-header h2 { margin: 0; font-size: 1.25rem; font-weight: 700; color: #111; }
        .card-header .count-info { font-size: 13px; color: #666; display: flex; gap: 6px; }
        .card-header .count-info span { font-weight: 500; }
        .card-header .count-info span.bold { font-weight: 700; }
        .count-approve { color: #16a34a; }
        .count-pending { color: #0284c7; }
        .count-draft { color: #d97706; }
        .count-reject { color: #e11d48; }

        /* ── 필터 ── */
        .filter-container {
            background-color: var(--blue-filter-bg);
            border-radius: 6px;
            padding: 18px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .filter-group { display: flex; align-items: center; gap: 6px; }
        .filter-label { font-size: 13px; font-weight: 600; color: #555; white-space: nowrap; }

        .filter-input {
            padding: 7px 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 13px;
            background-color: #fff;
            outline: none;
            font-family: inherit;
            color: var(--text-main);
        }
        .filter-input:focus { border-color: #4285f4; }
        select.filter-input { cursor: pointer; }

        .btn-search {
            background-color: var(--dark-btn-bg);
            color: white; border: none;
            padding: 7px 14px; border-radius: 4px;
            font-size: 13px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 4px;
            font-family: inherit; transition: background 0.15s;
        }
        .btn-search:hover { background-color: #374151; }

        .btn-reset {
            background-color: #fff; color: #666;
            border: 1px solid #d1d5db;
            padding: 7px 14px; border-radius: 4px;
            font-size: 13px; cursor: pointer;
            font-family: inherit; transition: background 0.15s;
        }
        .btn-reset:hover { background-color: #f9fafb; }

        /* ── 액션 바 ── */
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .left-actions { display: flex; gap: 6px; align-items: center; }

        .btn {
            padding: 6px 12px; font-size: 13px; font-weight: 500;
            border-radius: 4px; border: 1px solid #d1d5db;
            background: #fff; cursor: pointer;
            display: inline-flex; align-items: center; gap: 4px;
            color: #333; font-family: inherit; transition: background 0.15s;
        }
        .btn:hover { background-color: #f3f4f6; }

        .btn-write {
            background-color: #f59e0b; color: white;
            border: none; padding: 8px 18px;
            font-weight: 700; font-size: 13px; text-decoration: none;
            display: inline-flex; align-items: center; gap: 4px;
            border-radius: 4px; transition: background 0.15s;
        }
        .btn-write:hover { background-color: #d97706; }

        /* ── 테이블 ── */
        .table-container { width: 100%; overflow-x: auto; border-top: 2px solid #333; }

        table {
            width: 100%; border-collapse: collapse;
            font-size: 14px; min-width: 900px;
        }

        th {
            background-color: #fafafa;
            border-bottom: 1px solid #e5e7eb;
            padding: 12px 10px;
            font-weight: 700; color: #333;
            text-align: center; white-space: nowrap;
        }

        td {
            padding: 14px 10px;
            border-bottom: 1px solid #f1f3f5;
            text-align: center; vertical-align: middle; color: #444;
        }

        tr:hover td { background-color: #fafcff; }

        /* ── 기사명 셀 ── */
        .cell-title { text-align: left; font-weight: 600; color: #111; cursor: pointer; }
        .cell-title:hover { text-decoration: underline; }
        
        .comment-count { color: #888; font-size: 12px; font-weight: normal; margin-left: 4px; }
        .icon-img { display: inline-block; margin-left: 4px; color: #aaa; font-size: 12px; }

        /* ── 상태 배지 ── */
        .badge-status {
            display: inline-block; padding: 4px 12px; border-radius: 4px;
            font-size: 11px; font-weight: 700; color: #fff; white-space: nowrap;
        }
        .status-reject  { background-color: #ff5e3a; } /* 반려중 */
        .status-draft   { background-color: #fbbf24; } /* 작성중 */
        .status-pending { background-color: #0ea5e9; } /* 승인신청 */
        .status-approve { background-color: #16a34a; } /* 승인 */

        /* ── 섹션 라벨 ── */
        .section-primary { font-weight: 600; color: #333; }
        .section-secondary { font-size: 13px; color: #666; }

        /* ── 날짜 ── */
        .date-text { font-size: 13px; color: #888; letter-spacing: 0.02em; }

        /* ── 페이지네이션 ── */
        .pagination { display: flex; justify-content: center; margin-top: 32px; gap: 4px; }
        .page-link {
            width: 32px; height: 32px;
            display: flex; justify-content: center; align-items: center;
            border: 1px solid #d1d5db; border-radius: 4px;
            font-size: 13px; color: #666; text-decoration: none;
            background: #fff; cursor: pointer; transition: background 0.12s;
        }
        .page-link:hover { background-color: #f3f4f6; }
        .page-link.active { background-color: var(--dark-btn-bg); color: #fff; border-color: var(--dark-btn-bg); }
    </style>
</head>
<body>

<div class="admin-card">
    <div class="card-header">
        <h2>기사관리</h2>
        <div class="count-info">
            ( <span class="count-approve">승인 <span class="bold" id="cntApprove">0</span>건</span> / 
            <span class="count-pending">승인신청 <span class="bold" id="cntPending">0</span>건</span> / 
            <span class="count-draft">작성중 <span class="bold" id="cntDraft">0</span>건</span> / 
            <span class="count-reject">반려 <span class="bold" id="cntReject">0</span>건</span> )
        </div>
    </div>

    <!-- 검색/필터 영역 -->
    <div class="filter-container">
        <div class="filter-group">
            <span class="filter-label">진행상황</span>
            <select class="filter-input" id="filterStatus">
                <option value="all">전체</option>
                <option value="published">승인</option>
                <option value="pending">승인신청</option>
                <option value="draft">작성중</option>
                <option value="hidden">반려중</option>
            </select>
        </div>
        
        <div class="filter-group">
            <span class="filter-label">1차섹션</span>
            <select class="filter-input" id="primarySection" onchange="updateSecondaryOptions()">
                <option value="all">전체</option>
                <option value="우리동네부동산">우리동네부동산</option>
                <option value="뉴스칼럼">뉴스칼럼</option>
            </select>
        </div>

        <div class="filter-group">
            <span class="filter-label">2차섹션</span>
            <select class="filter-input" id="secondarySection">
                <option value="all">전체</option>
                <!-- 자바스크립트로 동적 렌더링 -->
            </select>
        </div>

        <div class="filter-group" style="flex:1;">
            <input type="text" id="filterKeyword" class="filter-input" placeholder="검색어를 입력하세요." style="width: 100%; max-width: 250px;">
        </div>

        <button class="btn-search" onclick="applyFilter()">🔍 검색</button>
        <button class="btn-reset" onclick="resetFilter()">초기화</button>
    </div>

    <!-- 액션 및 유틸 버튼 영역 -->
    <div class="action-bar">
        <div class="left-actions">
            <!-- 기사 쓰기 폼으로 이동 (동일 프레임 내부에서 열림) -->
            <button onclick="window.parent.loadPage(null, '기사쓰기', 'news_write.html')" class="btn-write" style="cursor:pointer;">+ 기사쓰기</button>
            <button class="btn">⭐ 광고순위갱신</button>
            <button class="btn">🗑️ 선택삭제</button>
        </div>
        <div class="right-actions"></div>
    </div>

    <!-- 테이블 리스트 -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 40px;"><input type="checkbox"></th>
                    <th style="width: 100px;">진행상황</th>
                    <th>기사명</th>
                    <th style="width: 140px;">1차섹션</th>
                    <th style="width: 160px;">2차섹션</th>
                    <th style="width: 150px;">승인일자</th>
                </tr>
            </thead>
            <tbody id="articleTableBody">
                <tr><td colspan="6" style="text-align:center; color:#aaa; padding:40px;">로딩 중...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- 페이징 마크업 -->
    <div class="pagination" id="paginationArea">
        <a href="#" class="page-link" style="border:none;" onclick="changePage(currentPage-1); return false;">&lt;</a>
        <span id="pageLinks"></span>
        <a href="#" class="page-link" style="border:none;" onclick="changePage(currentPage+1); return false;">&gt;</a>
    </div>
</div>

<script>
    var sb = window.gongsiClient;
    var PAGE_SIZE = 10;
    var currentPage = 1;
    var totalCount  = 0;
    var activeFilter = { status: 'all', section1: 'all', keyword: '' };

    function statusInfo(s) {
        var map = {
            published: { cls: 'status-approve', label: '승인' },
            pending:   { cls: 'status-pending', label: '승인신청' },
            draft:     { cls: 'status-draft',   label: '작성중' },
            hidden:    { cls: 'status-reject',  label: '반려중' }
        };
        return map[s] || { cls: 'status-draft', label: s };
    }

    function formatDate(dt) {
        if (!dt) return '-';
        var d = new Date(dt);
        var pad = function(n){ return n < 10 ? '0'+n : n; };
        return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
    }

    async function loadCounts() {
        if (!sb) return;
        var pairs = [['published','cntApprove'],['pending','cntPending'],['draft','cntDraft'],['hidden','cntReject']];
        for (var i=0;i<pairs.length;i++) {
            var res = await sb.from('articles').select('id',{count:'exact',head:true}).eq('status',pairs[i][0]);
            var el = document.getElementById(pairs[i][1]);
            if (el) el.textContent = res.count || 0;
        }
    }

    async function loadArticles() {
        if (!sb) {
            document.getElementById('articleTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;color:#e11d48;padding:40px;">Supabase 클라이언트 초기화 실패. 세션을 확인하세요.</td></tr>';
            return;
        }
        document.getElementById('articleTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;color:#aaa;padding:40px;">로딩 중...</td></tr>';

        var from = (currentPage-1)*PAGE_SIZE, to = from+PAGE_SIZE-1;
        var q = sb.from('articles')
            .select('id,status,article_type,title,section1,section2,reporter_name,created_at,view_count',{count:'exact'})
            .order('created_at',{ascending:false})
            .range(from,to);
        if (activeFilter.status  !== 'all') q = q.eq('status',  activeFilter.status);
        if (activeFilter.section1 !== 'all') q = q.eq('section1',activeFilter.section1);
        if (activeFilter.keyword) q = q.ilike('title','%'+activeFilter.keyword+'%');

        var res = await q;
        if (res.error) {
            document.getElementById('articleTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;color:#e11d48;padding:40px;">로딩 오류: '+res.error.message+'</td></tr>';
            return;
        }
        totalCount = res.count || 0;
        renderTable(res.data || []);
        renderPagination();
    }

    function renderTable(rows) {
        var tbody = document.getElementById('articleTableBody');
        if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#aaa;padding:40px;">등록된 기사가 없습니다.</td></tr>';
            return;
        }
        tbody.innerHTML = rows.map(function(a){
            var si = statusInfo(a.status);
            var icon = (a.article_type !== 'normal') ? ' 🖼️' : '';
            return '<tr>'
              +'<td><input type="checkbox" data-id="'+a.id+'"></td>'
              +'<td><span class="badge-status '+si.cls+'">'+si.label+'</span></td>'
              +'<td class="cell-title" onclick="editArticle('+a.id+')">'+escHtml(a.title||'(제목없음)')+icon+'</td>'
              +'<td class="section-primary">'+(a.section1||'-')+'</td>'
              +'<td class="section-secondary">'+(a.section2||'-')+'</td>'
              +'<td class="date-text">'+formatDate(a.created_at)+'</td>'
              +'</tr>';
        }).join('');
    }

    function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function renderPagination() {
        var total = Math.ceil(totalCount/PAGE_SIZE);
        var html = '';
        for (var p=1;p<=total;p++){
            html += '<a href="#" class="page-link'+(p===currentPage?' active':'')
              +'" onclick="changePage('+p+');return false;">'+p+'</a>';
        }
        document.getElementById('pageLinks').innerHTML = html;
    }

    function changePage(p){
        var total=Math.ceil(totalCount/PAGE_SIZE); if(p<1||p>total) return;
        currentPage=p; loadArticles();
    }

    function applyFilter(){
        activeFilter.status   = document.getElementById('filterStatus').value;
        activeFilter.section1 = document.getElementById('primarySection').value;
        activeFilter.keyword  = document.getElementById('filterKeyword').value.trim();
        currentPage=1; loadArticles();
    }

    function resetFilter(){
        document.getElementById('filterStatus').value='all';
        document.getElementById('primarySection').value='all';
        document.getElementById('filterKeyword').value='';
        activeFilter={status:'all',section1:'all',keyword:''};
        currentPage=1; loadArticles();
    }

    function editArticle(id){ alert('기사 ID '+id+' 수정 기능은 전로 준비 중입니다.'); }

    var secondaryOptions = {
        '우리동네부동산':['아파트·오피스텔','빌라·주택','원룸·투룸','상가·업무·공장·토지','분양'],
        '뉴스칼럼':['부동산·주식·재테크','정치·경제·사회','세무·법률','여행·맛집','건강·헬스','IT·가전·가구','스포츠·연예·Car','인물·미션·기타']
    };
    function updateSecondaryOptions(){
        var p=document.getElementById('primarySection').value;
        var s=document.getElementById('secondarySection');
        s.innerHTML='<option value="all">전체</option>';
        (secondaryOptions[p]||[]).forEach(function(o){var e=document.createElement('option');e.value=o;e.textContent=o;s.appendChild(e);});
    }

    document.addEventListener('DOMContentLoaded', function(){
        setTimeout(function(){ sb=window.gongsiClient; loadCounts(); loadArticles(); }, 400);
    });
</script>
</body>
</html>
